<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5. Cas</title>
</head>
<body>
    <h2>Danas cemo koristiti eksterne linkove. Nakon toga 
        konacno krecemo sa CSS.
    </h2>
<!-- Za koriscenje aksternih linkova se mora upotrebiti a tag, on u sebi ima 
    atribut(obavezni)href koji je zapravo adresa stranice -->
    <p>Ako zelite pristupiti stranici google.rs pritisnite sledeci link: 
        <a href="https://www.google.com/" target="_blank">Google</a>
    </p>
    <h3>Sada cemo koristiti a tag preko fotografije</h3>
    <p>Klikom na slici ispod cete posetiti facebook stranicu.</p>
    <a target="_blank" href="https://www.facebook.com/"
        ><img src="./logo.png" alt="facebook" width="200" height="150"
    ></a>
</body>
</html>
